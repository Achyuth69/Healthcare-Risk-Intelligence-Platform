apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: healthrisk-ingress
  namespace: healthrisk
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
spec:
  tls:
    - hosts:
        - api.healthrisk.ai
        - app.healthrisk.ai
      secretName: healthrisk-tls
  rules:
    - host: api.healthrisk.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: healthrisk-backend-service
                port:
                  number: 80
    - host: app.healthrisk.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: healthrisk-frontend-service
                port:
                  number: 80
