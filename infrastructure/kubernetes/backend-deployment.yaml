apiVersion: apps/v1
kind: Deployment
metadata:
  name: healthrisk-backend
  namespace: healthrisk
  labels:
    app: healthrisk-backend
    version: "1.0.0"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: healthrisk-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: healthrisk-backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: healthrisk-backend-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: backend
          image: your-ecr-registry/healthrisk-backend:1.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: healthrisk-secrets
                  key: database-url
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: healthrisk-secrets
                  key: jwt-secret-key
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: healthrisk-secrets
                  key: secret-key
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: healthrisk-secrets
                  key: encryption-key
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: healthrisk-secrets
                  key: redis-url
            - name: CHROMA_HOST
              value: "chromadb-service"
            - name: APP_ENV
              value: "production"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 5
          volumeMounts:
            - name: model-artifacts
              mountPath: /app/models
              readOnly: true
      volumes:
        - name: model-artifacts
          persistentVolumeClaim:
            claimName: model-artifacts-pvc
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: healthrisk-backend
---
apiVersion: v1
kind: Service
metadata:
  name: healthrisk-backend-service
  namespace: healthrisk
spec:
  selector:
    app: healthrisk-backend
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: healthrisk-backend-hpa
  namespace: healthrisk
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: healthrisk-backend
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
