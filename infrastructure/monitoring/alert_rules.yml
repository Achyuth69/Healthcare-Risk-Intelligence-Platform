groups:
  - name: healthrisk_alerts
    rules:
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.01
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High error rate on HealthRisk API"
          description: "Error rate is {{ $value | humanizePercentage }} over the last 5 minutes."

      - alert: HighLatency
        expr: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket[5m])) > 3
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High p99 latency"
          description: "p99 latency is {{ $value }}s — above 3s threshold."

      - alert: PodCrashLooping
        expr: rate(kube_pod_container_status_restarts_total{namespace="healthrisk"}[15m]) > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Pod crash-looping in healthrisk namespace"
          description: "Pod {{ $labels.pod }} is restarting frequently."

      - alert: DatabaseConnectionsHigh
        expr: pg_stat_activity_count > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL connection count high"
          description: "{{ $value }} active connections — approaching pool limit."
