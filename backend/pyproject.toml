[tool.ruff]
line-length = 100
target-version = "py311"
select = ["E", "F", "W", "I", "N", "UP", "B", "C4", "SIM"]
ignore = ["E501", "B008", "N805"]
exclude = ["alembic/", ".venv/"]

[tool.ruff.isort]
known-first-party = ["app"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
strict = false
warn_return_any = false
warn_unused_ignores = true
exclude = ["alembic/"]

[tool.coverage.run]
source = ["app"]
omit = ["app/ml/llm/finetune_llama.py", "alembic/*", "tests/*"]

[tool.coverage.report]
show_missing = true
fail_under = 70
