services:
  # ── Backend API ─────────────────────────────────────────────
  - type: web
    name: healthrisk-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements-render.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: false
      - key: DATABASE_URL
        sync: false   # set manually in Render dashboard
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_KEY
        sync: false   # set manually
      - key: GROQ_API_KEY
        sync: false   # set manually
      - key: GROQ_MODEL
        value: llama3-70b-8192
      - key: REDIS_URL
        sync: false   # set manually (Upstash)
      - key: CHROMA_HOST
        value: localhost
      - key: MODEL_ARTIFACTS_DIR
        value: /tmp/models
      - key: LOG_LEVEL
        value: INFO
      - key: LOG_FORMAT
        value: json
