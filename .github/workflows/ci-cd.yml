name: CI/CD Pipeline — Healthcare Risk Platform

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  BACKEND_IMAGE: healthrisk-backend
  FRONTEND_IMAGE: healthrisk-frontend

jobs:
  # ── Backend Tests ─────────────────────────────────────────────
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        working-directory: ./backend
        run: pip install -r requirements.txt

      - name: Run linting
        working-directory: ./backend
        run: |
          pip install ruff mypy
          ruff check app/
          mypy app/ --ignore-missing-imports

      - name: Run tests
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql+asyncpg://testuser:testpass@localhost:5432/testdb
          SECRET_KEY: test-secret-key-for-ci-only
          JWT_SECRET_KEY: test-jwt-secret-for-ci-only
          ENCRYPTION_KEY: test-encryption-key-32-bytes-here
          APP_ENV: test
        run: |
          pytest tests/ -v --cov=app --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./backend/coverage.xml

  # ── Frontend Tests ────────────────────────────────────────────
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Type check
        working-directory: ./frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: ./frontend
        run: npm run build

  # ── Security Scan ─────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-results.sarif"

  # ── Build & Push Docker Images ────────────────────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, security-scan]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        working-directory: ./backend
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker build -t $ECR_REGISTRY/$BACKEND_IMAGE:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$BACKEND_IMAGE:$IMAGE_TAG $ECR_REGISTRY/$BACKEND_IMAGE:latest
          docker push $ECR_REGISTRY/$BACKEND_IMAGE:$IMAGE_TAG
          docker push $ECR_REGISTRY/$BACKEND_IMAGE:latest
          echo "BACKEND_IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Build and push frontend image
        working-directory: ./frontend
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker build -t $ECR_REGISTRY/$FRONTEND_IMAGE:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$FRONTEND_IMAGE:$IMAGE_TAG $ECR_REGISTRY/$FRONTEND_IMAGE:latest
          docker push $ECR_REGISTRY/$FRONTEND_IMAGE:$IMAGE_TAG
          docker push $ECR_REGISTRY/$FRONTEND_IMAGE:latest

  # ── Deploy to EKS ─────────────────────────────────────────────
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name healthrisk-cluster --region ${{ env.AWS_REGION }}

      - name: Deploy to Kubernetes
        run: |
          # Update image tags
          kubectl set image deployment/healthrisk-backend \
            backend=$ECR_REGISTRY/$BACKEND_IMAGE:${{ github.sha }} \
            -n healthrisk

          kubectl set image deployment/healthrisk-frontend \
            frontend=$ECR_REGISTRY/$FRONTEND_IMAGE:${{ github.sha }} \
            -n healthrisk

          # Wait for rollout
          kubectl rollout status deployment/healthrisk-backend -n healthrisk --timeout=300s
          kubectl rollout status deployment/healthrisk-frontend -n healthrisk --timeout=300s

      - name: Run smoke tests
        run: |
          BACKEND_URL=$(kubectl get ingress healthrisk-ingress -n healthrisk -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          curl -f https://$BACKEND_URL/health || exit 1
          echo "Smoke test passed"

      - name: Notify on success
        if: success()
        run: echo "Deployment successful for commit ${{ github.sha }}"

      - name: Rollback on failure
        if: failure()
        run: |
          kubectl rollout undo deployment/healthrisk-backend -n healthrisk
          kubectl rollout undo deployment/healthrisk-frontend -n healthrisk
          echo "Rollback completed"
